Meu primeiro projeto no GitHub
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Portfólio</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f8;
      color: #333;
      text-align: center;
      padding: 50px;
    }

    .avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #3498db;
      margin-bottom: 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #555555;
      max-width: 600px;
      margin: 10px auto 20px auto;
    }

    .button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
      transition: 0.3s;
    }

    .button:hover {
      background-color: #2980b9;
    }

    a {
      color: #e67e22;
      text-decoration: none;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888888;
    }
  </style>
</head>

<body>

  <!-- Avatar -->
  <img src="https://via.placeholder.com/150" alt="Foto" class="avatar">

  <!-- Nome -->
  <h1>Olá, eu sou [Agta] 👋</h1>

  <!-- Descrição -->
  <p>
    Este é meu primeiro projeto no GitHub 🚀<br>
    Estou construindo meus primeiros projetos.
  </p>

  <!-- Botão interativo -->
  <button class="button" onclick="mostrarMensagem()">Clique aqui</button>
  <p id="mensagem"></p>

  <!-- Links -->
  <button class="button" onclick="window.location.href='https://www.linkedin.com/in/agta-silva'">
    Meu LinkedIn
  </button>

  <button class="button" onclick="window.location.href='https://github.com/agtavice-cloud'">
    Meu GitHub
  </button>

  <footer>
    © 2026 [SEU NOME] • Meu primeiro site
  </footer>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").innerText = "Obrigado por visitar meu site! 🎉";
    }
  </script>

</body>
</html>
